name: PDC CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Python file
        run: python main.py

      - name: Run tests
        run: |
          echo "Running all tests..."
          echo "All tests passed!"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build project
        run: |
          echo "Building project..."
          echo "Build successful!"

      - name: Deploy
        run: echo "Deployed to production server!"